name: Bug report
description: Report reproducible incorrect behavior in the adapter
title: '[Bug]: '
labels:
    - bug
body:
    - type: markdown
      attributes:
          value: |
              Thank you for reporting a problem.

              Please verify that the issue still occurs with the current adapter version and is caused by this adapter rather than ioBroker core, another adapter, or the DREO app itself.

              Do not publish DREO credentials, access tokens, refresh tokens, complete serial numbers, account identifiers, family identifiers, room identifiers, or unredacted WebSocket captures.

              General setup questions belong in the ioBroker community forum.

    - type: textarea
      id: bug-description
      attributes:
          label: Describe the bug
          description: Explain what happened and what is wrong.
          placeholder: Tell us what you observed.
      validations:
          required: true

    - type: textarea
      id: reproduce
      attributes:
          label: Steps to reproduce
          description: Provide the smallest reliable sequence that triggers the problem.
          placeholder: |
              1. Start the adapter
              2. Change ...
              3. Observe ...
      validations:
          required: true

    - type: textarea
      id: expected-behavior
      attributes:
          label: Expected behavior
          description: Explain what you expected instead.
      validations:
          required: true

    - type: dropdown
      id: region
      attributes:
          label: DREO cloud region
          options:
              - EU
              - US
              - Unknown
      validations:
          required: true

    - type: input
      id: device-model
      attributes:
          label: DREO device model
          description: Enter the model only, not the serial number.
          placeholder: e.g. DR-HCF007S
      validations:
          required: true

    - type: dropdown
      id: shared-home
      attributes:
          label: Is the device accessed through a shared DREO home?
          options:
              - 'Yes'
              - 'No'
              - 'Unknown'
      validations:
          required: true

    - type: markdown
      attributes:
          value: |
              ## Environment

    - type: input
      id: adapter-version
      attributes:
          label: Adapter version
          placeholder: e.g. 0.0.1
      validations:
          required: true

    - type: input
      id: js-controller-version
      attributes:
          label: js-controller version
          description: Determine this with `iobroker -v`.
          placeholder: e.g. 7.2.2
      validations:
          required: true

    - type: input
      id: node-version
      attributes:
          label: Node.js version
          description: Determine this with `node -v`.
          placeholder: e.g. v22.22.2
      validations:
          required: true

    - type: input
      id: operating-system
      attributes:
          label: Operating system
          placeholder: e.g. Debian 13
      validations:
          required: true

    - type: textarea
      id: relevant-states
      attributes:
          label: Relevant ioBroker states
          description: List the affected friendly or raw state paths. Remove identifying device IDs where possible.
          placeholder: |
              devices.<redacted>.fan.speed
              devices.<redacted>.raw.windlevel

    - type: textarea
      id: logs
      attributes:
          label: Relevant logs
          description: |
              Provide only the relevant section, preferably with adapter log level set to debug.
              Remove credentials, tokens, complete serial numbers, account data, family IDs, room IDs, and private network details.
          render: text
      validations:
          required: true

    - type: checkboxes
      id: confirmations
      attributes:
          label: Confirmation
          options:
              - label: I reproduced the issue with the current adapter version.
                required: true
              - label: I removed credentials, tokens, complete serial numbers, and other identifying DREO data.
                required: true
              - label: I searched existing issues for the same problem.
                required: true
