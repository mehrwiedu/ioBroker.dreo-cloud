name: Feature request
description: Suggest an adapter improvement or new general functionality
title: '[Feature Request]: '
labels:
    - enhancement
body:
    - type: markdown
      attributes:
          value: |
              Use this form for general adapter improvements.

              For support of a new DREO model, a newly observed raw state, or a device-specific function, use the **Device or function support** template instead.

              General setup questions belong in the ioBroker community forum.

    - type: textarea
      id: problem-description
      attributes:
          label: Problem or limitation
          description: Explain the problem the requested feature would solve.
          placeholder: Describe the current limitation.
      validations:
          required: true

    - type: textarea
      id: proposed-solution
      attributes:
          label: Proposed solution
          description: Describe the behavior you would like to see.
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Describe workarounds or alternative approaches you considered.

    - type: textarea
      id: additional-context
      attributes:
          label: Additional context
          description: Add relevant examples, screenshots, or links.

    - type: checkboxes
      id: confirmations
      attributes:
          label: Confirmation
          options:
              - label: This request concerns the adapter and not ioBroker core or the DREO app.
                required: true
              - label: I searched existing issues for a similar request.
                required: true
